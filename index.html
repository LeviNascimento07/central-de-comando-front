<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGI – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

  <div class="container" style="max-width:420px">
    <div class="card card-auth">
      <div class="card-header text-center text-white">
        <div class="logo-circle"><i class="bi bi-shield-check"></i></div>
        <h4 class="mb-0 fw-bold">SGI</h4>
        <small class="opacity-75">Sistema de Gestão de Incidentes</small>
      </div>
      <div class="card-body p-4">
        <div id="alert-box"></div>
        <form id="form-login" novalidate>
          <div class="mb-3">
            <label for="usuario" class="form-label fw-semibold">Usuário</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="usuario" class="form-control" placeholder="Seu login de acesso" required />
            </div>
          </div>
          <div class="mb-4">
            <label for="senha" class="form-label fw-semibold">Senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required />
              <button class="btn btn-outline-secondary" type="button" id="toggle-senha">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-sgi w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
          </button>
        </form>
        <hr />
        <p class="text-center mb-0 small">
          Não tem conta? <a href="cadastro.html" class="fw-semibold">Criar conta</a>
        </p>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">&copy; 2025 SGI – Todos os direitos reservados</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
