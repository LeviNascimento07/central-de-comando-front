<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGI – Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-sgi fixed-top shadow-sm">
    <div class="container-xl">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="home.html">
        <i class="bi bi-shield-check fs-5"></i> SGI
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="home.html"><i class="bi bi-house me-1"></i>Início</a></li>
          <li class="nav-item"><a class="nav-link" href="usuarios.html"><i class="bi bi-people me-1"></i>Usuários</a></li>
          <li class="nav-item"><a class="nav-link" href="equipamentos.html"><i class="bi bi-pc-display me-1"></i>Equipamentos</a></li>
          <li class="nav-item"><a class="nav-link" href="incidentes.html"><i class="bi bi-exclamation-triangle me-1"></i>Incidentes</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white small"><i class="bi bi-person-circle me-1"></i><span id="nome-usuario"></span></span>
          <button class="btn btn-outline-light btn-sm" onclick="sair()"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-xl mt-5 pt-4 pb-5">
    <!-- Hero -->
    <div class="hero-dashboard d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h3 class="fw-bold mb-1"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h3>
        <p class="mb-0 opacity-75">Bem-vindo(a), <strong id="hero-nome"></strong>! Visão geral do sistema.</p>
      </div>
      <i class="bi bi-shield-check" style="font-size:4rem;opacity:.2"></i>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-xl-3">
        <div class="card stat-card h-100 border-start border-danger border-4">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon text-danger"><i class="bi bi-exclamation-circle-fill"></i></div>
            <div>
              <div class="text-muted small">Abertos</div>
              <div class="fs-2 fw-bold" id="stat-abertos">–</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="card stat-card h-100 border-start border-warning border-4">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon text-warning"><i class="bi bi-arrow-repeat"></i></div>
            <div>
              <div class="text-muted small">Em Andamento</div>
              <div class="fs-2 fw-bold" id="stat-andamento">–</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="card stat-card h-100 border-start border-success border-4">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon text-success"><i class="bi bi-check-circle-fill"></i></div>
            <div>
              <div class="text-muted small">Resolvidos</div>
              <div class="fs-2 fw-bold" id="stat-resolvidos">–</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="card stat-card h-100 border-start border-info border-4">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon text-info"><i class="bi bi-clock-history"></i></div>
            <div>
              <div class="text-muted small">Total Incidentes</div>
              <div class="fs-2 fw-bold" id="stat-total">–</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabela recentes -->
    <div class="card table-card">
      <div class="card-header d-flex align-items-center justify-content-between py-3 px-4">
        <h6 class="mb-0 fw-bold text-white"><i class="bi bi-list-ul me-2"></i>Incidentes Recentes</h6>
        <a href="incidentes.html" class="btn btn-light btn-sm">Ver todos</a>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th class="ps-4">ID</th>
                <th>Data</th>
                <th>Descrição</th>
                <th>Equipamento</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tabela-recentes">
              <tr><td colspan="5" class="text-center py-4 text-muted">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
